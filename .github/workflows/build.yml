name: Build FOV Tweak
on: [push]

jobs:
  build:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4
      
      - name: Install Theos
        run: |
          git clone --recursive https://github.com/theos/theos $HOME/theos
          echo "THEOS=$HOME/theos" >> $GITHUB_ENV
          
      - name: Install SDK
        run: |
          $HOME/theos/bin/install-theos-sdks.sh

      - name: Build
        run: |
          export THEOS=$HOME/theos
          make

      - name: Upload dylib
        uses: actions/upload-artifact@v4
        with:
          name: SmashKartsFOV
          path: .theos/obj/debug/*.dylib
