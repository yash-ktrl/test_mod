name: Build FOV Tweak
on: [push]
jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Theos
        run: |
          set -e
          sudo git clone --recursive https://github.com/theos/theos /theos
          echo "THEOS=/theos" >> $GITHUB_ENV
          
      - name: Install SDK
        run: |
          sudo curl -L https://github.com/theos/sdks/releases/download/2023-09-11/iPhoneOS16.5.sdk.tar.xz | sudo tar -xJf - -C /theos/sdks/

      - name: Build
        run: make

      - name: Upload dylib
        uses: actions/upload-artifact@v4
        with:
          name: SmashKartsFOV
          path: .theos/obj/debug/*.dylib
