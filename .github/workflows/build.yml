name: Build FOV Tweak
on: [push]
jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Theos
        run: |
          git clone --recursive https://github.com/theos/theos $HOME/theos
          echo "THEOS=$HOME/theos" >> $GITHUB_ENV
          
      - name: Install SDK
        run: |
          curl -LO https://github.com/theos/sdks/releases/download/2023-09-11/iPhoneOS16.5.sdk.tar.xz
          tar -xJf iPhoneOS16.5.sdk.tar.xz -C $HOME/theos/sdks/

      - name: Build
        run: make

      - name: Upload dylib
        uses: actions/upload-artifact@v4
        with:
          name: SmashKartsFOV
          path: .theos/obj/debug/*.dylib
